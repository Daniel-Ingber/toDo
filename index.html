<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do project</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js" defer></script>
</head>
<body>
    <div class="flex">
    <main>
        <h1>To-Do List</h1>
        <div id="filters">
            <h3>פילטרים:</h3>
            <button id="toUrgency"><div>לפי חשיבות</div><div class="context"></div></button>
            <button id="toCategory"><div>לפי קטגוריה</div><div class="context"></div></button>
            <button id="toPerson"><div>לפי בעל משימה</div><div class="context"></div></button>
            <button id="toComplete"><div>לפי ביצוע משימה</div><div class="context"></div></button>
            <button id="toReset"><div>אפס</div></button>
        </div>

        <div id="sort">
            <h3>מיין:</h3>
            <button id="fromName"><div>לפי שמות</div><span class="direction"></span></button>
            <button id="fromDate"><div>לפי תאריך</div><span class="direction"></span></button>
            <button id="fromUrgency"><div>לפי חשיבות</div><span class="direction"></span></button>
            <button id="fromReset"><div>אפס</div></button>
        </div>

        <ul id="tasks">
            <li></li>
            <li><div><p>לא נמצא מה שרצית... אתה בטוח שזה קיים?</p></div></li>
        </ul>

        <div id="newTask">
            <span>משימה:</span>
            <input id="taskInput" type="text" placeholder="הוסף משימה..."/>
            <span>מבצע:</span>
            <input id="taskUser" type="text" placeholder="שם מבצע המשימה"/>
            <span>חשיבות:</span>
            <select id="taskUrgency"></select>
            <span>נושא:</span>
            <select id="taskIcon"></select>
            <input id="taskDate" type="date"/>
            <button id="addTask">הוסף משימה</button>
        </div>

    </main>
    </div>
    <footer>
        <div>
            <span>- made by Daniel Ingber -</span>
        </div>
    </footer>
</body>
</html>
